<head>

</script>
<style>
:root{
  --bg:#0f1117;--sf:#181c27;--sf2:#1e2336;--sf3:#252b40;
  --bd:#2a3050;--bd2:#323a58;
  --tx:#e8eaf6;--tx2:#8892b0;--tx3:#4a5580;
  --blue:#5b8dee;--green:#3dd68c;--red:#f06292;--yellow:#ffd166;
  --purple:#b388ff;--teal:#4dd0e1;--orange:#ff8a65;
  --ess:#5b8dee;--laz:#ffd166;--inv:#3dd68c;
  --fn:'DM Sans',sans-serif;--mo:'DM Mono',monospace;
  --r:14px;--rs:8px;--sh:0 4px 24px rgba(0,0,0,.4);--tr:.18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--fn)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--sf)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 18px 24px;display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:.65rem;color:var(--tx3);margin-top:1px}
.nav-sec{padding:0 10px;margin-bottom:4px}
.nav-lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:0 8px;margin-bottom:3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;font-size:.84rem;font-weight:500;color:var(--tx2);transition:var(--tr);margin-bottom:1px}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.on{background:linear-gradient(135deg,rgba(91,141,238,.18),rgba(179,136,255,.1));color:var(--blue);border:1px solid rgba(91,141,238,.2)}
.ni-icon{font-size:.9rem;width:18px;text-align:center}
.sf-foot{margin-top:auto;padding:14px 16px 0;border-top:1px solid var(--bd)}
.mnav{background:var(--sf3);border:1px solid var(--bd2);border-radius:6px;padding:2px 7px;font-size:.72rem;color:var(--tx2);cursor:pointer;transition:var(--tr)}
.mnav:hover{background:var(--bd2);color:var(--tx)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px;min-width:0}
.ph{margin-bottom:24px}
.pt{font-size:1.5rem;font-weight:700;letter-spacing:-.03em}
.ps{font-size:.82rem;color:var(--tx3);margin-top:2px}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:var(--tr)}
.kcard:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:var(--sh)}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--blue))}
.kl{font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3);margin-bottom:7px}
.kv{font-size:1.4rem;font-weight:700;letter-spacing:-.03em;font-family:var(--mo)}
.kv.pos{color:var(--green)}.kv.neg{color:var(--red)}
.ks{font-size:.68rem;color:var(--tx3);margin-top:3px}
.kglow{position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.07;background:var(--ac,var(--blue));filter:blur(18px);pointer-events:none}

/* SECTION */
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
.sec-h{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sec-t{font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:7px}

/* TABLE */
.tw{overflow-x:auto}.ts{max-height:340px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead tr{border-bottom:1px solid var(--bd)}
thead th{padding:9px 13px;text-align:left;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(42,48,80,.4);transition:var(--tr)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sf2)}
td{padding:9px 13px;color:var(--tx2);vertical-align:middle}
td.nm{color:var(--tx);font-weight:500}
td.am{font-family:var(--mo);font-weight:500;text-align:right}
td.am.cr{color:var(--green)}.am.db{color:var(--red)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:.68rem;font-weight:500}
.bb{background:rgba(91,141,238,.15);color:var(--blue);border:1px solid rgba(91,141,238,.2)}
.bg{background:rgba(61,214,140,.12);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.br{background:rgba(240,98,146,.12);color:var(--red);border:1px solid rgba(240,98,146,.2)}
.by{background:rgba(255,209,102,.12);color:var(--yellow);border:1px solid rgba(255,209,102,.2)}
.bp{background:rgba(179,136,255,.12);color:var(--purple);border:1px solid rgba(179,136,255,.2)}
.bt{background:rgba(77,208,225,.12);color:var(--teal);border:1px solid rgba(77,208,225,.2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rs);font-size:.78rem;font-weight:600;transition:var(--tr)}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#4a7de0;box-shadow:0 0 18px rgba(91,141,238,.3)}
.btn-g{background:var(--sf2);color:var(--tx2);border:1px solid var(--bd)}.btn-g:hover{background:var(--sf3);color:var(--tx)}
.btn-sm{padding:3px 9px;font-size:.7rem}
.btn-ic{padding:5px;border-radius:var(--rs);background:var(--sf2);color:var(--tx2);border:1px solid var(--bd);transition:var(--tr)}.btn-ic:hover{background:var(--sf3);color:var(--tx)}
.btn-green{background:rgba(61,214,140,.15);color:var(--green);border:1px solid rgba(61,214,140,.25)}.btn-green:hover{background:rgba(61,214,140,.25)}
.btn-red{background:rgba(240,98,146,.15);color:var(--red);border:1px solid rgba(240,98,146,.25)}.btn-red:hover{background:rgba(240,98,146,.25)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.md{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);width:500px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:var(--sh);animation:su .2s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:.95rem;font-weight:700}
.mb{padding:18px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi.s2{grid-column:span 2}
label{font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--tx3)}
input[type=text],input[type=number],input[type=date],select,textarea{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 11px;color:var(--tx);font-size:.83rem;transition:var(--tr);width:100%;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(91,141,238,.1)}
input::placeholder{color:var(--tx3)}
select option{background:var(--sf2)}
textarea{resize:vertical;min-height:60px}

/* PROGRESS */
.pb{height:6px;background:var(--sf3);border-radius:99px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:99px;transition:width .5s ease}

/* SALDO BAR */
.sbar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.sbar-lbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);flex-shrink:0}
.sbar-track{flex:1;height:7px;background:var(--sf3);border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.sbar-val{font-family:var(--mo);font-size:.8rem;font-weight:600;flex-shrink:0;min-width:95px;text-align:right}

/* QUICK ADD */
.qa{background:linear-gradient(135deg,rgba(91,141,238,.07),rgba(179,136,255,.05));border:1px solid rgba(91,141,238,.18);border-radius:var(--r);padding:14px 18px;margin-bottom:18px}
.qa-t{font-size:.78rem;font-weight:600;color:var(--blue);margin-bottom:10px}
.qa-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:9px;align-items:end}

/* TOAST */
.tc{position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--sf2);border:1px solid var(--bd2);border-radius:var(--rs);padding:9px 14px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh);font-size:.8rem;animation:tsi .2s ease;max-width:270px}
@keyframes tsi{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* AUTH */
.auth-ov{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-card{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:36px 44px;text-align:center;max-width:340px;width:90%}
.auth-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px;box-shadow:0 0 22px rgba(91,141,238,.28)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:11px 18px;background:#fff;color:#3c4043;border-radius:var(--rs);font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:var(--tr);box-shadow:0 2px 8px rgba(0,0,0,.14)}
.btn-google:hover{box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(-1px)}
.user-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--sf2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:10px}
.u-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover}
.u-name{font-size:.75rem;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.syncing{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-so{font-size:.68rem;color:var(--tx3);padding:2px 7px;border-radius:5px;background:var(--sf3);border:1px solid var(--bd);cursor:pointer;transition:var(--tr)}
.btn-so:hover{color:var(--red);border-color:var(--red)}

/* MACRO CARDS */
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.macro-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;transition:var(--tr)}
.macro-card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:var(--sh)}
.macro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.macro-ess::before{background:var(--ess)}
.macro-laz::before{background:var(--laz)}
.macro-inv::before{background:var(--inv)}
.mc-label{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.mc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:.75rem}
.mc-row-lbl{color:var(--tx3)}
.mc-row-val{font-family:var(--mo);font-weight:600}
.mc-over{border-color:var(--red)!important}
.alert-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:600;padding:2px 7px;border-radius:99px;background:rgba(240,98,146,.12);color:var(--red);border:1px solid rgba(240,98,146,.2)}

/* CONTAS A RECEBER/PAGAR */
.status-pend{background:rgba(255,209,102,.12);color:var(--yellow);border:1px solid rgba(255,209,102,.2)}
.status-pago{background:rgba(61,214,140,.12);color:var(--green);border:1px solid rgba(61,214,140,.2)}
.status-venc{background:rgba(240,98,146,.12);color:var(--red);border:1px solid rgba(240,98,146,.2)}
.parc-badge{background:rgba(179,136,255,.12);color:var(--purple);border:1px solid rgba(179,136,255,.2);font-size:.65rem;padding:1px 6px;border-radius:99px;font-weight:600}

/* ANNUAL */
.yr-sel{display:flex;align-items:center;gap:10px}
.yr-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rs);padding:5px 12px;font-size:.8rem;font-weight:600;color:var(--tx2);cursor:pointer;transition:var(--tr)}
.yr-btn:hover{background:var(--sf3);color:var(--tx)}
.ann-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.mcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:var(--tr)}
.mcard:hover{border-color:var(--bd2)}
.mcard-h{padding:11px 15px;background:var(--sf2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mcard-t{font-size:.88rem;font-weight:700}
.mcard-b{padding:11px 15px}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(42,48,80,.25);font-size:.75rem}
.mrow:last-child{border-bottom:none}
.mrow-r{display:flex;align-items:center;gap:8px}
.mrow-v{font-family:var(--mo);font-size:.76rem;font-weight:500}
.var-up{font-size:.62rem;font-weight:600;color:var(--red);padding:1px 5px;border-radius:99px;background:rgba(240,98,146,.1)}
.var-dn{font-size:.62rem;font-weight:600;color:var(--green);padding:1px 5px;border-radius:99px;background:rgba(61,214,140,.1)}
.var-eq{font-size:.62rem;font-weight:600;color:var(--tx3)}
.acum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.acum-cell{padding:14px 16px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.acum-cell:nth-child(4n){border-right:none}
.acum-lbl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:5px}
.acum-val{font-family:var(--mo);font-size:.95rem;font-weight:700}
.insight-card{background:linear-gradient(135deg,rgba(91,141,238,.07),rgba(179,136,255,.05));border:1px solid rgba(91,141,238,.15);border-radius:var(--rs);padding:10px 14px;font-size:.78rem;display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.comp-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.comp-tbl th{padding:8px 12px;text-align:right;font-size:.62rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--bd);white-space:nowrap}
.comp-tbl th:first-child{text-align:left}
.comp-tbl td{padding:8px 12px;border-bottom:1px solid rgba(42,48,80,.35);text-align:right}
.comp-tbl td:first-child{text-align:left;color:var(--tx2);font-weight:500}
.comp-tbl tr:last-child td{border-bottom:none}
.comp-tbl tr:hover td{background:var(--sf2)}

/* METAS */
.metas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:22px}
.meta-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:var(--tr)}
.meta-card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:var(--sh)}
.meta-top{height:4px}
.meta-body{padding:16px 18px}
.meta-title{font-size:.9rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.meta-obs{font-size:.72rem;color:var(--tx3);margin-bottom:10px;font-style:italic;line-height:1.5}
.meta-vals{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px}
.meta-foot{display:flex;align-items:center;justify-content:space-between;font-size:.7rem;color:var(--tx3);margin-top:10px}

/* CALCULADORAS */
.calc-tabs{display:flex;gap:2px;background:var(--sf2);border-radius:var(--rs);padding:3px;margin-bottom:20px}
.ctab{flex:1;text-align:center;padding:7px 10px;border-radius:6px;font-size:.78rem;font-weight:600;color:var(--tx3);cursor:pointer;transition:var(--tr)}
.ctab.on{background:var(--sf);color:var(--tx);box-shadow:var(--sh)}
.cbox{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px;margin-bottom:18px}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.cgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.cfi{display:flex;flex-direction:column;gap:4px}
.cres{background:linear-gradient(135deg,rgba(91,141,238,.07),rgba(61,214,140,.05));border:1px solid rgba(91,141,238,.18);border-radius:var(--rs);padding:18px 22px;margin-top:6px}
.cres-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.cri-lbl{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:3px}
.cri-val{font-family:var(--mo);font-size:1rem;font-weight:700}
.cbtn{width:100%;padding:9px;border-radius:var(--rs);background:var(--blue);color:#fff;font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:var(--tr);margin-top:4px}
.cbtn:hover{background:#4a7de0;box-shadow:0 0 18px rgba(91,141,238,.3)}

.empty{padding:36px;text-align:center;color:var(--tx3)}
.empty-icon{font-size:2rem;margin-bottom:7px}
.empty-txt{font-size:.8rem}
@media(max-width:900px){.sidebar{display:none}.main{padding:18px 14px}.kgrid{grid-template-columns:1fr 1fr}.macro-grid{grid-template-columns:1fr}.ann-grid{grid-template-columns:1fr}}
@media(max-width:600px){.kgrid{grid-template-columns:1fr}.qa-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div><div class="logo-text">Financeiro</div><div class="logo-sub">Controle pessoal</div></div>
  </div>
  <div class="nav-sec">
    <div class="nav-lbl">Menu</div>
    <div class="ni on" data-page="dash" onclick="go('dash')"><span class="ni-icon">📊</span>Dashboard</div>
    <div class="ni" data-page="trans" onclick="go('trans')"><span class="ni-icon">🛒</span>Transações</div>

    <div class="ni" data-page="cards" onclick="go('cards')"><span class="ni-icon">🃏</span>Cartões</div>
    <div class="ni" data-page="anual" onclick="go('anual')"><span class="ni-icon">📅</span>Visão Anual</div>
    <div class="ni" data-page="metas" onclick="go('metas')"><span class="ni-icon">🎯</span>Metas</div>
    <div class="ni" data-page="calc" onclick="go('calc')"><span class="ni-icon">🧮</span>Calculadoras</div>

  <div class="sf-foot">
    <div id="user-bar" class="user-bar" style="display:none">
      <span class="sync-dot" id="sync-dot" style="background:var(--green)"></span>
      <img class="u-avatar" id="u-avatar" src="" alt=""/>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <button class="mnav" onclick="chMonth(-1)">◀</button>
      <span style="font-size:.78rem;font-weight:600" id="mlbl">—</span>
      <button class="mnav" onclick="chMonth(1)">▶</button>

    <div style="margin-top:10px;display:flex;gap:5px">
      <button class="btn btn-g btn-sm" style="flex:1" onclick="expData()">⬇ Export</button>
      <button class="btn btn-g btn-sm" style="flex:1" onclick="impClick()">⬆ Import</button>

    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="impData(event)"/>
  </div>
</aside>
<main class="main" id="mc"></main>
</div>
<div class="tc" id="toasts"></div>
<div class="auth-ov" id="auth-ov">
  <div class="auth-card">
    <div class="auth-logo">💰</div>
    <div style="font-size:1.3rem;font-weight:700;margin-bottom:5px">Financeiro</div>
    <div style="font-size:.8rem;color:var(--tx3);margin-bottom:24px;line-height:1.6">Faça login para acessar seu controle financeiro sincronizado na nuvem.</div>
    <button class="btn-google" onclick="signInG()">
      <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Entrar com Google
    </button>
  </div>
</div>

<script>
// ══════════════ CONSTANTS ══════════════════════════
const DEF_MACROS=[
  {id:'ess',nome:'Essenciais',emoji:'🏠',cor:'var(--ess)',hex:'#5b8dee',
   cats:['Moradia','Contas','Mercado','Transporte']},
  {id:'laz',nome:'Lazer',emoji:'🎉',cor:'var(--laz)',hex:'#ffd166',
   cats:['Alimentação fora','Lazer','Compras pessoais','Beleza','Presentes']},
  {id:'inv',nome:'Investimentos',emoji:'📈',cor:'var(--inv)',hex:'#3dd68c',
   cats:['Reserva de emergência','Investimentos','Dívidas']},
];
// Dynamic getters — always read from state
const getMacros=()=>S.macros&&S.macros.length?S.macros:DEF_MACROS.map(m=>({...m,cats:[...m.cats]}));
const getAllCats=()=>getMacros().flatMap(m=>m.cats);
// Legacy aliases kept for compat
const getMacro=id=>getMacros().find(m=>m.id===id);
const getCatMacro=cat=>getMacros().find(m=>m.cats.includes(cat));
const TIPOS_PAG=['Débito','PIX','Dinheiro'];
const DEF_CARDS=[{id:'ca1',nome:'Crédito 1',cor:'#b388ff'},{id:'ca2',nome:'Crédito 2',cor:'#5b8dee'},{id:'ca3',nome:'Crédito 3',cor:'#4dd0e1'},{id:'ca4',nome:'Crédito 4',cor:'#3dd68c'}];
const CC=['#5b8dee','#f06292','#3dd68c','#ffd166','#b388ff','#4dd0e1','#ff8a65','#a5d6a7','#ce93d8','#80deea','#ffcc02','#ef9a9a'];

// ══════════════ STATE ══════════════════════════════
let S={
  page:'dash',
  month:new Date().toISOString().slice(0,7),
  data:{}, // {YYYY-MM:{trans:[],entradas:[],receber:[],pagar:[]}}
  cards:[...DEF_CARDS.map(c=>({...c}))],
  macros:[...DEF_MACROS.map(m=>({...m,cats:[...m.cats]}))],
  orcMacro:{}, // {ess:{},laz:{},inv:{}} orcamento macro
  orcMicro:{}, // {Moradia:0, ...}
  metas:[],
  _ts:0
};

const getCards=()=>S.cards&&S.cards.length?S.cards:DEF_CARDS;
const getTipos=()=>[...TIPOS_PAG,...getCards().map(c=>c.nome)];

function mk(m){return m||S.month;}
function gm(m){
  const k=mk(m);
  if(!S.data[k])S.data[k]={trans:[],entradas:[],receber:[],pagar:[]};
  const d=S.data[k];
  if(!d.trans)d.trans=[];
  if(!d.entradas)d.entradas=[];
  if(!d.receber)d.receber=[];
  if(!d.pagar)d.pagar=[];
  return d;
}

function save(){
  localStorage.setItem('fin_v4',JSON.stringify(S));
  clearTimeout(window._saveT);
  window._saveT=setTimeout(cloudSave,900);
}
function load(){
  try{
    const d=localStorage.getItem('fin_v4');
    if(d){
      const p=JSON.parse(d);
      S.month=p.month||S.month;
      S.data=p.data||{};
      S.cards=p.cards||[...DEF_CARDS];
      S.orcMacro=p.orcMacro||{};
      S.orcMicro=p.orcMicro||{};
      S.metas=p.metas||[];
      S.macros=p.macros||DEF_MACROS.map(m=>({...m,cats:[...m.cats]}));
      S._ts=p._ts||0;
    }
  }catch(e){}
}
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);

// ══════════════ UTILS ══════════════════════════════
const fmt=n=>'R$ '+(+n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function mname(ym){const[y,m]=ym.split('-');return['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][+m-1]+' '+y;}
const sum=(a,f)=>a.reduce((s,b)=>s+(+b[f]||0),0);
const sumCat=(arr,cat)=>arr.filter(x=>x.categoria===cat).reduce((s,b)=>s+(+b.valor||0),0);
function parseBRL(s){if(!s)return 0;s=String(s).trim();if(s.includes(','))s=s.replace(/\./g,'').replace(',','.');return parseFloat(s)||0;}
function fmtBRL(n){if(!n)return '';return (+n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function maskBRL(el){
  el.addEventListener('blur',function(){const v=parseBRL(this.value);if(v>0)this.value=fmtBRL(v);else this.value='';});
  el.addEventListener('focus',function(){const v=parseBRL(this.value);if(v>0)this.value=String(v).replace('.',',');});
}
function applyMasks(){document.querySelectorAll('.brl').forEach(el=>{if(!el.dataset.m){el.dataset.m='1';maskBRL(el);}});}

function toast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast';
  const col=type==='ok'?'var(--green)':type==='err'?'var(--red)':'var(--yellow)';
  el.innerHTML=`<span class="tdot" style="background:${col}"></span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
function tbadge(t){
  const card=getCards().find(c=>c.nome===t);
  if(card)return`<span class="badge bp" style="border-color:${card.cor}40;color:${card.cor}">${t}</span>`;
  const m={'Débito':'bb','PIX':'bg','Dinheiro':'by'};
  return`<span class="badge ${m[t]||'bb'}">${t}</span>`;
}
function statusBadge(s,venc){
  if(s==='pago')return`<span class="badge status-pago">✅ Pago</span>`;
  const v=venc?new Date(venc+'T00:00:00'):null;
  if(v&&v<new Date())return`<span class="badge status-venc">⚠️ Vencido</span>`;
  return`<span class="badge status-pend">⏳ Pendente</span>`;
}

function chMonth(d){
  const[y,m]=S.month.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  S.month=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
  save();render();
}
function go(page){
  S.page=page;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.dataset.page===page));
  rpage();
}

// ══════════════ CALCULATIONS ══════════════════════
function calcTotals(m){
  const d=gm(m);
  // entradas: manual + contas a receber pagas
  const entManual=sum(d.entradas,'valor');
  const entReceber=d.receber.filter(r=>r.status==='pago').reduce((s,r)=>{
    if(r.parcelas&&r.parcelas>1){
      return s+r.parc.filter(p=>p.status==='pago'&&mk2(p.venc)===mk(m)).reduce((a,p)=>a+(+p.valor||0),0);
    }
    return s+(mk2(r.venc)===mk(m)?(+r.valor||0):0);
  },0);
  const tE=entManual+entReceber;

  // saídas: transações + contas a pagar pagas
  const tTrans=sum(d.trans,'valor');
  const tPagar=d.pagar.filter(p=>p.status==='pago').reduce((s,p)=>{
    if(p.parcelas&&p.parcelas>1){
      return s+p.parc.filter(pc=>pc.status==='pago'&&mk2(pc.venc)===mk(m)).reduce((a,pc)=>a+(+pc.valor||0),0);
    }
    return s+(mk2(p.venc)===mk(m)?(+p.valor||0):0);
  },0);
  const tS=tTrans+tPagar;
  return{tE,tS,saldo:tE-tS};
}
function mk2(dateStr){if(!dateStr)return'';return dateStr.slice(0,7);}

function catTotals(m){
  const d=gm(m);
  return getAllCats().map(cat=>({cat,v:sumCat(d.trans,cat)}));
}
function macroTotals(m){
  const ct={};catTotals(m).forEach(x=>ct[x.cat]=x.v);
  return getMacros().map(mac=>{
    const real=mac.cats.reduce((s,c)=>s+(ct[c]||0),0);
    const orc=S.orcMacro[mac.id]||0;
    return{mac,real,orc,saldo:orc-real,over:orc>0&&real>orc};
  });
}

// ══════════════ FIREBASE ══════════════════════════
let currentUser=null,unsubSync=null,saveT=null;
function waitFb(cb,n=0){if(window._fb)cb();else if(n<40)setTimeout(()=>waitFb(cb,n+1),150);else console.error('FB timeout');}
function initFb(){
  waitFb(()=>{
    const{auth,onAuthStateChanged}=window._fb;
    onAuthStateChanged(auth,user=>{
      if(user){
        currentUser=user;
        document.getElementById('auth-ov').style.display='none';
        const ub=document.getElementById('user-bar');ub.style.display='flex';
        document.getElementById('u-name').textContent=user.displayName||user.email;
        document.getElementById('u-avatar').src=user.photoURL||'';
        startSync();
      }else{
        currentUser=null;
        document.getElementById('auth-ov').style.display='flex';
        document.getElementById('user-bar').style.display='none';
        if(unsubSync){unsubSync();unsubSync=null;}
      }
    });
  });
}
function signInG(){
  waitFb(()=>{
    const{auth,GoogleAuthProvider,signInWithRedirect}=window._fb;
    const provider=new GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    signInWithRedirect(auth,provider).catch(err=>toast('Erro: '+err.message,'err'));
  });
}
function doSignOut(){if(!confirm('Sair?'))return;waitFb(()=>window._fb.signOut(window._fb.auth));}
function setSyncDot(s){const d=document.getElementById('sync-dot');if(!d)return;d.classList.toggle('syncing',s==='syncing');d.style.background=s==='ok'?'var(--green)':s==='syncing'?'var(--yellow)':'var(--red)';}
function startSync(){
  if(!currentUser)return;
  const{db,doc,onSnapshot}=window._fb;
  const ref=doc(db,'users',currentUser.uid,'data','state');
  unsubSync=onSnapshot(ref,snap=>{
    if(snap.exists()){
      const r=snap.data();
      if(r&&r._ts&&r._ts>S._ts){
        S.data=r.data||S.data;S.cards=r.cards||S.cards;
        S.orcMacro=r.orcMacro||S.orcMacro;S.orcMicro=r.orcMicro||S.orcMicro;
        S.metas=r.metas||S.metas;S.macros=r.macros||S.macros;S._ts=r._ts;
        save();render();
      }
    }
    setSyncDot('ok');
  },e=>{setSyncDot('err');console.error(e);});
}
function cloudSave(){
  if(!currentUser||!window._fb)return;
  setSyncDot('syncing');
  const{db,doc,setDoc}=window._fb;
  S._ts=Date.now();
  setDoc(doc(db,'users',currentUser.uid,'data','state'),{
    data:S.data,cards:S.cards,orcMacro:S.orcMacro,orcMicro:S.orcMicro,metas:S.metas,macros:S.macros,_ts:S._ts
  }).then(()=>setSyncDot('ok')).catch(e=>{setSyncDot('err');console.error(e);});
}

// ══════════════ RENDER ════════════════════════════
let chartInst=null;
function rpage(){
  const mc=document.getElementById('mc');
  const pages={dash:pDash,trans:pTrans,receber:pReceber,pagar:pPagar,cats:pCats,cards:pCards,anual:pAnual,metas:pMetas,calc:pCalc};
  if(chartInst){chartInst.destroy();chartInst=null;}
  mc.innerHTML=(pages[S.page]||pDash)();
  if(S.page==='dash')initDashChart();
  setTimeout(applyMasks,60);
}
function render(){document.getElementById('mlbl').textContent=mname(S.month);rpage();}

// ══════════════ DASHBOARD ═════════════════════════
function pDash(){
  const t=calcTotals();
  const pct=t.tE>0?t.tS/t.tE:0;
  const mt=macroTotals();
  const recent=[...gm().trans].sort((a,b)=>new Date(b.data||0)-new Date(a.data||0)).slice(0,6);
  const barCol=pct>.9?'linear-gradient(90deg,var(--red),var(--yellow))':pct>.7?'linear-gradient(90deg,var(--yellow),var(--teal))':'linear-gradient(90deg,var(--green),var(--teal))';

  return`
<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between">
  <div><div class="pt">📊 Dashboard</div><div class="ps">${mname(S.month)}</div></div>
</div>

<div class="kgrid">
  <div class="kcard" style="--ac:var(--green)"><div class="kglow"></div>
    <div class="kl">💵 Entradas</div><div class="kv pos">${fmt(t.tE)}</div>
    <div class="ks">${gm().entradas.length} lançamento(s)</div>
  </div>
  <div class="kcard" style="--ac:var(--red)"><div class="kglow" style="background:var(--red)"></div>
    <div class="kl">💸 Saídas</div><div class="kv neg">${fmt(t.tS)}</div>
    <div class="ks">Transações + Contas pagas</div>
  </div>
  <div class="kcard" style="--ac:var(--teal)"><div class="kglow" style="background:var(--teal)"></div>
    <div class="kl">📥 A Receber</div>
    <div class="kv" style="color:var(--teal)">${fmt(sum(gm().receber.filter(r=>r.status!=='pago'),'valor'))}</div>
    <div class="ks">${gm().receber.filter(r=>r.status!=='pago').length} pendente(s)</div>
  </div>
  <div class="kcard" style="--ac:${t.saldo>=0?'var(--green)':'var(--red)'}">
    <div class="kglow" style="background:${t.saldo>=0?'var(--green)':'var(--red)'}"></div>
    <div class="kl">💰 Saldo</div>
    <div class="kv ${t.saldo>=0?'pos':'neg'}">${fmt(t.saldo)}</div>
    <div class="ks">${t.saldo>=0?'✅ No azul':'⚠️ Negativo'}</div>
  </div>
</div>

<div class="sbar">
  <span class="sbar-lbl">Comprometido</span>
  <div class="sbar-track"><div class="sbar-fill" style="width:${Math.min(pct*100,100)}%;background:${barCol}"></div></div>
  <span class="sbar-val" style="color:${pct>.9?'var(--red)':pct>.7?'var(--yellow)':'var(--green)'}">${(pct*100).toFixed(1)}% da renda</span>
</div>

<div class="macro-grid">
${mt.map(item=>{
  const{mac,real,orc,saldo,over}=item;
  const pp=orc>0?Math.min(real/orc*100,100):0;
  const bc=over?'var(--red)':pp>80?'var(--yellow)':mac.cor;
  return`<div class="macro-card macro-${mac.id} ${over?'mc-over':''}">
    <div class="mc-label" style="color:${mac.cor}">${mac.emoji} ${mac.nome}${over?'<span class="alert-badge">⚠️ Estourou</span>':''}</div>
    <div class="mc-row"><span class="mc-row-lbl">Realizado</span><span class="mc-row-val" style="color:${mac.cor}">${fmt(real)}</span></div>
    <div class="mc-row"><span class="mc-row-lbl">Orçado</span><span class="mc-row-val" style="color:var(--tx2)">${orc>0?fmt(orc):'—'}</span></div>
    ${orc>0?`<div class="mc-row"><span class="mc-row-lbl">Restante</span><span class="mc-row-val" style="color:${over?'var(--red)':'var(--green)'}">${fmt(saldo)}</span></div>`:''}
    ${orc>0?`<div class="pb"><div class="pf" style="width:${pp}%;background:${bc}"></div></div>`:''}
  </div>`;
}).join('')}
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div class="sec" style="margin-bottom:0">
    <div class="sec-h"><div class="sec-t">🍕 Gastos por Categoria</div></div>
    <div style="padding:16px"><canvas id="dash-chart" style="max-height:220px"></canvas></div>
  </div>
  <div class="sec" style="margin-bottom:0">
    <div class="sec-h"><div class="sec-t">🕐 Últimos Lançamentos</div><button class="btn btn-g btn-sm" onclick="go('trans')">Ver todos</button></div>
    <div class="tw">
    ${recent.length?`<table><thead><tr><th>Nome</th><th>Categoria</th><th style="text-align:right">Valor</th></tr></thead>
    <tbody>${recent.map(g=>`<tr>
      <td class="nm" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.nome||'—'}</td>
      <td>${g.categoria?`<span class="badge bb" style="font-size:.62rem">${g.categoria}</span>`:`<span style="font-size:.65rem;color:var(--tx3);font-style:italic">Sem cat.</span>`}</td>
      <td class="am db">${fmt(g.valor)}</td>
    </tr>`).join('')}</tbody></table>`
    :'<div class="empty"><div class="empty-icon">📭</div><div class="empty-txt">Nenhum lançamento</div></div>'}
    </div>
  </div>
</div>`;
}

function initDashChart(){
  const ctx=document.getElementById('dash-chart');if(!ctx)return;
  const tots=catTotals().filter(x=>x.v>0);
  if(!tots.length){ctx.parentElement.innerHTML='<div class="empty"><div class="empty-icon">🍕</div><div class="empty-txt">Sem gastos ainda</div></div>';return;}
  chartInst=new Chart(ctx,{type:'doughnut',data:{
    labels:tots.map(x=>x.cat),
    datasets:[{data:tots.map(x=>x.v),backgroundColor:tots.map((_,i)=>CC[i%CC.length]),borderColor:'#181c27',borderWidth:2,hoverOffset:5}]
  },options:{responsive:true,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'#8892b0',font:{size:10},boxWidth:9,padding:8}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
}

// ══════════════ TRANSAÇÕES ════════════════════════
function pTrans(){
  const g=gm().trans;
  const catOpts=getAllCats().map(c=>`<option>${c}</option>`).join('');
  const tOpts=getTipos().map(t=>`<option>${t}</option>`).join('');
  return`
<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between">
  <div><div class="pt">🛒 Transações</div><div class="ps">${mname(S.month)} · ${g.length} item(s) · ${fmt(sum(g,'valor'))}</div></div>
  <button class="btn btn-p" onclick="openTrans()">+ Adicionar</button>
</div>
<div class="qa">
  <div class="qa-t">⚡ Lançamento Rápido</div>
  <div class="qa-row">
    <div class="cfi"><label>Nome</label><input type="text" id="qa-n" placeholder="ex: Supermercado"/></div>
    <div class="cfi"><label>Valor</label><input type="text" id="qa-v" placeholder="0,00" class="brl"/></div>
    <div class="cfi"><label>Categoria</label><select id="qa-c"><option value="">—</option>${catOpts}</select></div>
    <div class="cfi"><label>Tipo</label><select id="qa-t"><option value="">—</option>${tOpts}</select></div>
    <button class="btn btn-p" onclick="quickAdd()" style="height:36px;align-self:flex-end;white-space:nowrap">Salvar</button>
  </div>

// ══════════════ PARCELAS HELPERS ═════════════════
// Retorna todas as contas a receber do mês atual:
// 1. Contas simples cadastradas neste mês
// 2. Parcelas de contas parceladas (de qualquer mês) que vencem neste mês
function getReceberDoMes(m){
  const mesAtual=m||S.month;
  const result=[];
  // Scan all months for receber items
  Object.entries(S.data).forEach(([mk,md])=>{
    (md.receber||[]).forEach((item,idx)=>{
      if(!item.parc||item.parc.length===0){
        // Conta simples: mostrar apenas no mês de cadastro
        if(mk===mesAtual) result.push({item,idx,mk,parcIdx:null});
      } else {
        // Conta parcelada: mostrar a parcela que vence neste mês
        item.parc.forEach((p,pi)=>{
          const pMes=p.venc?p.venc.slice(0,7):mk;
          if(pMes===mesAtual){
            result.push({item,idx,mk,parcIdx:pi,parc:p});
          }
        });
      }
    });
  });
  return result;
}

function getPagarDoMes(m){
  const mesAtual=m||S.month;
  const result=[];
  Object.entries(S.data).forEach(([mk,md])=>{
    (md.pagar||[]).forEach((item,idx)=>{
      if(!item.parc||item.parc.length===0){
        if(mk===mesAtual) result.push({item,idx,mk,parcIdx:null});
      } else {
        item.parc.forEach((p,pi)=>{
          const pMes=p.venc?p.venc.slice(0,7):mk;
          if(pMes===mesAtual){
            result.push({item,idx,mk,parcIdx:pi,parc:p});
          }
        });
      }
    });
  });
  return result;
}

    </table>`,

}
function pagarParcela(tipo,idx,pi,itemMonth){
  // find item in the right month
  const mKey=itemMonth||S.month;
  const md=S.data[mKey];
  if(!md){toast('Mês não encontrado','err');return;}
  const list=tipo==='receber'?(md.receber||[]):(md.pagar||[]);
  const item=list[idx];
  if(!item){toast('Item não encontrado','err');return;}
  const parc=item.parc[pi];
  parc.status='pago';
  // launch in the parcela's own month
  const mPagoKey=parc.venc?parc.venc.slice(0,7):S.month;
  if(!S.data[mPagoKey])S.data[mPagoKey]={trans:[],entradas:[],receber:[],pagar:[]};
  const mPago=S.data[mPagoKey];
  if(tipo==='receber'){
    if(!mPago.entradas)mPago.entradas=[];
    mPago.entradas.push({id:uid(),nome:`[${parc.num}/${item.parcelas}] ${item.nome}`,valor:parc.valor,data:parc.venc||new Date().toISOString().slice(0,10),tipo:item.forma||'—'});
  }else{
    if(!mPago.trans)mPago.trans=[];
    mPago.trans.push({id:uid(),nome:`[${parc.num}/${item.parcelas}] ${item.nome}`,valor:parc.valor,data:parc.venc||new Date().toISOString().slice(0,10),tipo:item.forma||'—',categoria:item.categoria||''});
  }
  if(item.parc.every(p=>p.status==='pago'))item.status='pago';
  save();toast(`Parcela ${parc.num}/${item.parcelas} paga! ✅`);
  closeM();setTimeout(()=>go(tipo==='receber'?'receber':'pagar'),100);
}

function editParcela(tipo,idx,pi,itemMonth){
  const mKey=itemMonth||S.month;
  const md=S.data[mKey];
  const list=tipo==='receber'?(md?.receber||[]):(md?.pagar||[]);
  const item=list[idx];

  const parc=item.parc[pi];

function delParcela(tipo,idx,pi,itemMonth){
  if(!confirm('Excluir esta parcela?'))return;
  const mKey=itemMonth||S.month;
  const md=S.data[mKey];
  if(!md){toast('Mês não encontrado','err');return;}
  const list=tipo==='receber'?(md.receber||[]):(md.pagar||[]);
  const item=list[idx];
  if(!item||!item.parc){toast('Item não encontrado','err');return;}
  item.parc.splice(pi,1);
  // renumber remaining parcelas
  item.parc.forEach((p,i)=>p.num=i+1);
  item.parcelas=item.parc.length;
  // if no parcelas left, treat as simple item
  if(item.parc.length===0){delete item.parc;item.parcelas=1;}
  save();toast('Parcela removida','err');
  closeM();setTimeout(()=>go(tipo==='receber'?'receber':'pagar'),100);
}

// ── ORÇAMENTO MICRO com validação ──────────────────
function setOrcMicro(macId, cat, val, el){
  const v = parseBRL(val);
  const macros = getMacros();
  const mac = macros.find(m=>m.id===macId);
  const macOrc = S.orcMacro[macId]||0;
  if(macOrc>0){
    // soma de todos os micros desse macro (exceto o atual)
    const outrosMicros = (mac?.cats||[]).filter(c=>c!==cat).reduce((s,c)=>s+(S.orcMicro[c]||0),0);
    const disponivel = macOrc - outrosMicros;
    if(v > disponivel){
      toast(`⚠️ Limite! O macro ${mac?.nome} tem R$ ${fmtBRL(macOrc)} e já tem R$ ${fmtBRL(outrosMicros)} distribuído. Disponível: R$ ${fmtBRL(disponivel)}`,'warn');
      if(el) el.value = disponivel>0?fmtBRL(disponivel):'';
      S.orcMicro[cat] = disponivel>0?disponivel:0;
      save(); return;
    }
  }
  if(!v||v===0) delete S.orcMicro[cat]; else S.orcMicro[cat]=v;
  save();
}

function openRenameCat(oldName){
  openMd('✏️ Renomear Categoria',`
    <div class="fg">
      <div class="fi s2"><label>Nome atual</label><input type="text" value="${oldName}" disabled style="opacity:.5"/></div>
      <div class="fi s2"><label>Novo nome</label><input type="text" id="rc-n" value="${oldName}"/></div>
    </div>`,
  ()=>{
    const newName=document.getElementById('rc-n').value.trim();
    if(!newName){toast('Informe o nome','err');return false;}
    const macros=getMacros();
    if(macros.flatMap(m=>m.cats).includes(newName)&&newName!==oldName){toast('Já existe','err');return false;}
    macros.forEach(m=>{const i=m.cats.indexOf(oldName);if(i>-1)m.cats[i]=newName;});
    Object.values(S.data).forEach(d=>['trans','pagar','receber'].forEach(l=>(d[l]||[]).forEach(item=>{if(item.categoria===oldName)item.categoria=newName;})));
    if(S.orcMicro[oldName]!==undefined){S.orcMicro[newName]=S.orcMicro[oldName];delete S.orcMicro[oldName];}
    save();toast(`Renomeada para "${newName}"!`);go('cats');return true;
  });
}

function openMoveCat(cat,currentMacId){
  const macros=getMacros();
  const others=macros.filter(m=>m.id!==currentMacId);
  if(!others.length){toast('Só existe um grupo','err');return;}
  openMd(`↕️ Mover "${cat}"`,`
    <div class="fi"><label>Mover para o grupo</label>
      <select id="mv-m">${others.map(m=>`<option value="${m.id}">${m.emoji} ${m.nome}</option>`).join('')}</select>
    </div>`,
  ()=>{
    const targetId=document.getElementById('mv-m').value;
    const macros=getMacros();
    const cur=macros.find(m=>m.id===currentMacId);
    if(cur)cur.cats=cur.cats.filter(c=>c!==cat);
    const target=macros.find(m=>m.id===targetId);
    if(target&&!target.cats.includes(cat))target.cats.push(cat);
    save();toast(`"${cat}" movida para ${target?.nome}!`);go('cats');return true;
  });
}

function delCat(cat,macId){
  if(!confirm('Excluir a categoria "'+cat+'"?\n\nLançamentos com essa categoria ficarão sem categoria.'))return;
  const macros=getMacros();
  const mac=macros.find(m=>m.id===macId);
  if(mac)mac.cats=mac.cats.filter(c=>c!==cat);
  Object.values(S.data).forEach(d=>['trans','pagar','receber'].forEach(l=>(d[l]||[]).forEach(item=>{if(item.categoria===cat)item.categoria='';})));
  delete S.orcMicro[cat];
  save();toast('"'+cat+'" excluída','err');go('cats');
}

// ══════════════ VISÃO ANUAL ═══════════════════════
let yrView=new Date().getFullYear();
function pAnual(){
  const yr=yrView;
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const keys=MN.map((_,i)=>`${yr}-${String(i+1).padStart(2,'0')}`);
  const mdata=keys.map((k,i)=>{
    const t=calcTotals(k);
    const mt=macroTotals(k);
    const ct={};catTotals(k).forEach(x=>ct[x.cat]=x.v);
    return{key:k,name:MN[i],short:MN[i].slice(0,3),t,mt,ct};
  });

  // Acumulado
  const today=new Date();const isYr=yr===today.getFullYear();
  const upTo=isYr?today.getMonth():11;
  let acE=0,acS=0,acSaldo=0;const acMac={ess:0,laz:0,inv:0};
  mdata.slice(0,upTo+1).forEach(md=>{
    acE+=md.t.tE;acS+=md.t.tS;acSaldo+=md.t.saldo;
    md.mt.forEach(item=>acMac[item.mac.id]=(acMac[item.mac.id]||0)+item.real);
  });

  // Insights
  const actMons=mdata.filter(md=>md.t.tE>0||md.t.tS>0);
  const insights=[];
  if(actMons.length>0){
    const maxGasto=actMons.reduce((a,b)=>b.t.tS>a.t.tS?b:a);
    const minGasto=actMons.reduce((a,b)=>b.t.tS<a.t.tS?b:a);
    const maxEnt=actMons.reduce((a,b)=>b.t.tE>a.t.tE?b:a);
    insights.push(`📈 Maior gasto: <strong>${maxGasto.name}</strong> — ${fmt(maxGasto.t.tS)}`);
    insights.push(`📉 Menor gasto: <strong>${minGasto.name}</strong> — ${fmt(minGasto.t.tS)}`);
    insights.push(`💵 Maior entrada: <strong>${maxEnt.name}</strong> — ${fmt(maxEnt.t.tE)}`);
  }
  for(let i=1;i<actMons.length;i++){
    const cur=actMons[i],prv=actMons[i-1];
    getMacros().forEach(mac=>{
      const cv=cur.mt.find(x=>x.mac.id===mac.id)?.real||0;
      const pv=prv.mt.find(x=>x.mac.id===mac.id)?.real||0;
      if(pv>0){
        const pct=((cv-pv)/pv)*100;
        if(Math.abs(pct)>20)insights.push(`${pct>0?'⚠️':'✅'} ${mac.nome} ${pct>0?'subiu':'caiu'} <strong>${Math.abs(pct).toFixed(0)}%</strong> em ${cur.name} vs ${prv.name}`);
      }
    });
  }

  // Variance helper
  function varBadge(cur,prev,goodUp=true){
    if(!prev||prev===0)return'';
    const pct=((cur-prev)/Math.abs(prev))*100;
    if(Math.abs(pct)<0.5)return`<span class="var-eq">= 0%</span>`;
    const up=pct>0;const good=goodUp?up:!up;
    return`<span class="${good?'var-dn':'var-up'}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
  }

  // Active pairs for comparison
  const pairs=[];
  for(let i=1;i<mdata.length;i++){
    const c=mdata[i],p=mdata[i-1];
    if(c.t.tE>0||c.t.tS>0||p.t.tE>0||p.t.tS>0)pairs.push({c,p});
  }

  return`
<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
  <div><div class="pt">📅 Visão Anual Inteligente</div><div class="ps">Evolução completa de ${yr}</div></div>
  <div class="yr-sel">
    <button class="yr-btn" onclick="yrView--;go('anual')">◀</button>
    <span style="font-size:1rem;font-weight:700;min-width:52px;text-align:center">${yr}</span>
    <button class="yr-btn" onclick="yrView++;go('anual')">▶</button>
  </div>
</div>

<!-- ACUMULADO -->
<div class="sec">
  <div class="sec-h"><div class="sec-t">📊 Acumulado até ${MN[upTo]} ${yr}</div></div>
  <div class="acum-grid">
    <div class="acum-cell"><div class="acum-lbl">💵 Entradas</div><div class="acum-val pos">${fmt(acE)}</div></div>
    <div class="acum-cell"><div class="acum-lbl">💸 Saídas</div><div class="acum-val" style="color:var(--red)">${fmt(acS)}</div></div>
    <div class="acum-cell"><div class="acum-lbl">💰 Saldo</div><div class="acum-val ${acSaldo>=0?'pos':'neg'}">${fmt(acSaldo)}</div></div>
    ${MACROS.map((mac,i)=>`<div class="acum-cell" style="${i===MACROS.length-1?'border-right:none':''}">
      <div class="acum-lbl">${mac.emoji} ${mac.nome}</div>
      <div class="acum-val" style="color:${mac.cor}">${fmt(acMac[mac.id]||0)}</div>
    </div>`).join('')}
  </div>
</div>

<!-- INSIGHTS & ALERTAS -->
${insights.length?`<div class="sec">

function pMetas(){

  function mcard(meta,idx){

    const over=(meta.atual||0)>=(meta.objetivo||0)&&meta.objetivo>0;
    const bc=over?'var(--green)':pct>70?'var(--teal)':'var(--purple)';
    const dias=meta.prazo?Math.ceil((new Date(meta.prazo+'T00:00:00')-new Date())/(864e5)):null;
    return`<div class="meta-card ${meta.concluida?'':''}">
      <div class="meta-top" style="background:${meta.cor||'#b388ff'}"></div>
      <div class="meta-body">
        <div class="meta-title">${meta.emoji||'🎯'} ${meta.nome} ${meta.concluida?'<span class="badge bg" style="font-size:.62rem">✅ Concluída</span>':''}</div>
        ${meta.obs?`<div class="meta-obs">"${meta.obs}"</div>`:''}
        <div class="meta-vals">
          <div><div style="font-family:var(--mo);font-size:1rem;font-weight:700">${fmt(meta.atual||0)}</div>
          <div style="font-size:.7rem;color:var(--tx3)">de ${fmt(meta.objetivo||0)}</div></div>
          <div style="font-family:var(--mo);font-size:.82rem;font-weight:700;color:${bc}">${pct.toFixed(0)}%</div>
        </div>
        <div class="pb"><div class="pf" style="width:${pct}%;background:${bc}"></div></div>
        <div class="meta-foot">
          <div>
            ${meta.prazo?`<span>📅 ${new Date(meta.prazo+'T00:00:00').toLocaleDateString('pt-BR')}</span>`:''} 
            ${dias!==null&&!meta.concluida?`<span style="color:${dias<30?'var(--red)':dias<90?'var(--yellow)':'var(--tx3)'}"> (${dias>0?dias+'d':'vencido'})</span>`:''}
            ${!meta.concluida&&over?`<span style="color:var(--green);margin-left:6px">🎉 Atingida!</span>`:''}
            ${!meta.concluida&&!over?`<span style="color:var(--tx3)">Falta ${fmt(falta)}</span>`:''}

            ${!meta.concluida?`<button class="btn-ic" onclick="addValMeta(${idx})" title="Adicionar">💰</button>`:''}

            <button class="btn-ic" onclick="toggleMeta(${idx})">${meta.concluida?'↩️':'✅'}</button>
            <button class="btn-ic" onclick="delMeta(${idx})">🗑</button>

      </div>

  return`
<div class="ph" style="display:flex;align-items:flex-start;justify-content:space-between">
  <div><div class="pt">🎯 Metas</div><div class="ps">${ativas.length} ativa(s) · ${conc.length} concluída(s)</div></div>

</div>
${metas.length===0?`<div class="empty" style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:60px">
  <div class="empty-icon">🎯</div><div class="empty-txt" style="margin-bottom:14px">Crie sua primeira meta!</div>
  <button class="btn btn-p" onclick="openMeta()">+ Criar</button>
</div>`:''}
${ativas.length?`<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:10px">Em andamento</div>
<div class="metas-grid">${ativas.map((m,i)=>mcard(m,metas.indexOf(m))).join('')}</div>`:''}
${conc.length?`<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:10px;margin-top:8px">Concluídas</div>
<div class="metas-grid">${conc.map((m,i)=>mcard(m,metas.indexOf(m))).join('')}</div>`:''}`;
}
function openMeta(idx=null){
  const m=idx!==null?S.metas[idx]:{nome:'',emoji:'🎯',objetivo:0,atual:0,prazo:'',obs:'',cor:'#b388ff',concluida:false};
  const emojis=['🎯','🏠','🚗','✈️','💍','📱','🎓','🏖️','💻','👜','🐾','🎸','📚','💎'];
  const cols=['#b388ff','#5b8dee','#3dd68c','#ffd166','#f06292','#4dd0e1','#ff8a65','#9fa8da'];
  openMd(idx!==null?'✏️ Editar Meta':'🎯 Nova Meta',`
    <div class="fg">
      <div class="fi s2"><label>Nome</label><input type="text" id="m-n" value="${m.nome}" placeholder="ex: Viagem, Notebook…"/></div>
      <div class="fi"><label>Objetivo (R$)</label><input type="text" id="m-o" value="${m.objetivo?fmtBRL(m.objetivo):''}" placeholder="0,00" class="brl"/></div>
      <div class="fi"><label>Já guardei (R$)</label><input type="text" id="m-a" value="${m.atual?fmtBRL(m.atual):''}" placeholder="0,00" class="brl"/></div>
      <div class="fi"><label>Prazo</label><input type="date" id="m-p" value="${m.prazo||''}"/></div>
      <div class="fi"><label>Emoji</label>

          ${emojis.map(e=>`<button onclick="document.getElementById('m-em').value='${e}';document.querySelectorAll('.em-b').forEach(b=>b.style.outline='none');this.style.outline='2px solid var(--blue)'" class="em-b" style="font-size:1.1rem;padding:3px 5px;border-radius:5px;background:var(--sf3);border:1px solid var(--bd);cursor:pointer;outline:${m.emoji===e?'2px solid var(--blue)':'none'}">${e}</button>`).join('')}
        </div>
        <input type="hidden" id="m-em" value="${m.emoji||'🎯'}"/>
      </div>
      <div class="fi"><label>Cor</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:3px">
          ${cols.map(c=>`<button onclick="document.getElementById('m-cr').value='${c}';document.querySelectorAll('.mc-b').forEach(b=>b.style.outline='none');this.style.outline='2px solid white'" class="mc-b" style="width:22px;height:22px;border-radius:50%;background:${c};border:none;cursor:pointer;outline:${m.cor===c?'2px solid white':'none'}"></button>`).join('')}
        </div>
        <input type="hidden" id="m-cr" value="${m.cor||'#b388ff'}"/>
      </div>
      <div class="fi s2"><label>Observações</label><textarea id="m-ob">${m.obs||''}</textarea></div>

    const meta={nome,emoji:document.getElementById('m-em').value||'🎯',cor:document.getElementById('m-cr').value||'#b388ff',objetivo:parseBRL(document.getElementById('m-o').value||'0'),atual:parseBRL(document.getElementById('m-a').value||'0'),prazo:document.getElementById('m-p').value||'',obs:document.getElementById('m-ob').value.trim(),concluida:idx!==null?(S.metas[idx].concluida||false):false};
    if(idx===null)S.metas.push(meta);else S.metas[idx]=meta;
    save();toast(`Meta "${nome}" salva!`);return true;
  });
}
function addValMeta(idx){
  openMd(`💰 Adicionar — ${S.metas[idx].nome}`,`
    <div style="background:var(--sf2);border-radius:var(--rs);padding:11px 14px;margin-bottom:14px;display:flex;justify-content:space-between">
      <span style="font-size:.78rem;color:var(--tx3)">Guardado atual</span>
      <span style="font-family:var(--mo);font-weight:700;color:var(--green)">${fmt(S.metas[idx].atual||0)}</span>
    </div>
    <div class="cfi"><label>Valor a adicionar (R$)</label><input type="text" id="av" placeholder="0,00" class="brl"/></div>`,
  ()=>{
    const v=parseBRL(document.getElementById('av').value||'0');
    if(!v||v<=0){toast('Valor inválido','err');return false;}
    S.metas[idx].atual=(S.metas[idx].atual||0)+v;
    if(S.metas[idx].objetivo>0&&S.metas[idx].atual>=S.metas[idx].objetivo)toast('🎉 Meta atingida!');
    else toast(`${fmt(v)} adicionado!`);
    save();return true;
  });
}
function toggleMeta(idx){S.metas[idx].concluida=!S.metas[idx].concluida;save();toast(S.metas[idx].concluida?'Meta concluída! 🎉':'Meta reaberta');go('metas');}
function delMeta(idx){if(!confirm(`Excluir "${S.metas[idx].nome}"?`))return;S.metas.splice(idx,1);save();toast('Meta removida','err');go('metas');}

let ctab='rf';
function pCalc(){
  return`
<div class="ph"><div class="pt">🧮 Calculadoras</div><div class="ps">Ferramentas financeiras</div></div>
<div class="calc-tabs">

</div>
${ctab==='rf'?cRF():ctab==='poup'?cPoup():ctab==='rv'?cRV():cMil()}`;

function cRF(){return`
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">📊 CDB / LCI / LCA</div>
  <div style="font-size:.76rem;color:var(--tx3);margin-bottom:18px">Calcule rendimento bruto e líquido. LCI/LCA são isentos de IR.</div>
  <div class="cgrid">
    <div class="cfi"><label>Valor (R$)</label><input type="text" id="rf-v" placeholder="10.000,00" class="brl"/></div>
    <div class="cfi"><label>Taxa (% a.a.)</label><input type="number" id="rf-t" placeholder="12.5" step="0.01"/></div>
    <div class="cfi"><label>Período (meses)</label><input type="number" id="rf-m" placeholder="12" min="1"/></div>
    <div class="cfi"><label>Tipo de Taxa</label><select id="rf-tt"><option value="pre">Prefixada</option><option value="cdi">% do CDI</option><option value="ipca">IPCA+</option></select></div>
    <div class="cfi"><label>CDI atual (%)</label><input type="number" id="rf-cdi" value="10.75" step="0.01"/></div>
    <div class="cfi"><label>IPCA atual (%)</label><input type="number" id="rf-ipca" value="4.83" step="0.01"/></div>
    <div class="cfi"><label>Produto</label><select id="rf-pr"><option value="cdb">CDB (IR regressivo)</option><option value="lci">LCI (Isento)</option><option value="lca">LCA (Isento)</option></select></div>
    <div class="cfi" style="grid-column:span 2;align-self:flex-end"><button class="cbtn" onclick="calcRF()">⚡ Calcular</button></div>
  </div>
  <div id="rf-res" style="display:none"></div>
</div>`;}
function calcRF(){
  const v=parseBRL(document.getElementById('rf-v')?.value||'0');
  const t=parseFloat(document.getElementById('rf-t')?.value||0);
  const m=parseInt(document.getElementById('rf-m')?.value||0);
  const tt=document.getElementById('rf-tt')?.value;
  const pr=document.getElementById('rf-pr')?.value;
  const cdi=parseFloat(document.getElementById('rf-cdi')?.value||10.75);
  const ipca=parseFloat(document.getElementById('rf-ipca')?.value||4.83);
  if(!v||!t||!m){toast('Preencha todos os campos','err');return;}
  let taa=t;if(tt==='cdi')taa=(t/100)*cdi;if(tt==='ipca')taa=ipca+t;
  const tm=Math.pow(1+taa/100,1/12)-1;
  const mont=v*Math.pow(1+tm,m);const rB=mont-v;
  let aliq=0;if(pr==='cdb'){if(m<=6)aliq=.225;else if(m<=12)aliq=.2;else if(m<=24)aliq=.175;else aliq=.15;}
  const ir=rB*aliq;const rL=rB-ir;
  const pctCDI=taa/cdi*100;
  const tmCDI=Math.pow(1+cdi/100,1/12)-1;
  const rCDI=(v*Math.pow(1+tmCDI,m)-v)*(1-(m<=6?.225:m<=12?.2:m<=24?.175:.15));
  document.getElementById('rf-res').style.display='block';
  document.getElementById('rf-res').innerHTML=`<div class="cres">
    <div class="cres-grid">
      <div><div class="cri-lbl">Rendimento Bruto</div><div class="cri-val" style="color:var(--blue)">${fmt(rB)}</div></div>
      ${pr==='cdb'?`<div><div class="cri-lbl">IR (${(aliq*100).toFixed(0)}%)</div><div class="cri-val" style="color:var(--red)">-${fmt(ir)}</div></div>`:'<div><div class="cri-lbl">IR</div><div class="cri-val" style="color:var(--green)">Isento</div></div>'}
      <div><div class="cri-lbl">Rendimento Líquido</div><div class="cri-val" style="color:var(--green)">${fmt(rL)}</div></div>
      <div><div class="cri-lbl">Montante Final</div><div class="cri-val">${fmt(v+rL)}</div></div>
      <div><div class="cri-lbl">% do CDI (líquido)</div><div class="cri-val" style="color:${pctCDI>=100?'var(--green)':pctCDI>=80?'var(--yellow)':'var(--red)'}">${pctCDI.toFixed(1)}%</div></div>
      <div><div class="cri-lbl">CDI 100% líquido</div><div class="cri-val" style="color:var(--teal)">${fmt(rCDI)}</div><div style="font-size:.7rem;color:var(--tx3)">${rL>=rCDI?'✅ Melhor que CDI':'⚠️ Abaixo do CDI'}</div></div>
    </div>
  </div>`;}
function cPoup(){return`
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">🏦 Poupança</div>
  <div style="font-size:.76rem;color:var(--tx3);margin-bottom:18px">Rende 70% da Selic quando acima de 8,5% a.a. Isento de IR.</div>
  <div class="cgrid2">
    <div class="cfi"><label>Valor Inicial (R$)</label><input type="text" id="p-vi" placeholder="1.000,00" class="brl"/></div>
    <div class="cfi"><label>Aporte Mensal (R$)</label><input type="text" id="p-am" placeholder="200,00" class="brl"/></div>
    <div class="cfi"><label>Selic atual (%)</label><input type="number" id="p-s" value="10.75" step="0.01"/></div>
    <div class="cfi"><label>Período (meses)</label><input type="number" id="p-m" placeholder="24" min="1"/></div>
  </div>
  <button class="cbtn" onclick="calcPoup()">⚡ Calcular</button>
  <div id="p-res" style="display:none;margin-top:14px"></div>
</div>`;}
function calcPoup(){
  const vi=parseBRL(document.getElementById('p-vi')?.value||'0');
  const am=parseBRL(document.getElementById('p-am')?.value||'0');
  const selic=parseFloat(document.getElementById('p-s')?.value||10.75);
  const m=parseInt(document.getElementById('p-m')?.value||0);
  if(!m||(vi===0&&am===0)){toast('Preencha os campos','err');return;}
  const taa=selic>8.5?selic*.7:6.17;const tm=Math.pow(1+taa/100,1/12)-1;
  let saldo=vi;let tot=vi;
  for(let i=0;i<m;i++){saldo=saldo*(1+tm)+am;tot+=am;}
  const rend=saldo-tot;
  const tmCDI=Math.pow(1+selic/100,1/12)-1;
  let sCDI=vi;for(let i=0;i<m;i++){sCDI=sCDI*(1+tmCDI)+am;}
  const irCDI=(m<=6?.225:m<=12?.2:m<=24?.175:.15);
  const sCDIliq=tot+(sCDI-tot)*(1-irCDI);
  document.getElementById('p-res').style.display='block';
  document.getElementById('p-res').innerHTML=`<div class="cres"><div class="cres-grid">
    <div><div class="cri-lbl">Total Aportado</div><div class="cri-val">${fmt(tot)}</div></div>
    <div><div class="cri-lbl">Rendimento</div><div class="cri-val" style="color:var(--green)">${fmt(rend)}</div></div>
    <div><div class="cri-lbl">Saldo Final</div><div class="cri-val" style="color:var(--green)">${fmt(saldo)}</div></div>
    <div><div class="cri-lbl">CDB 100% CDI líquido</div><div class="cri-val" style="color:var(--teal)">${fmt(sCDIliq)}</div><div style="font-size:.7rem;color:var(--tx3)">${saldo>sCDIliq?'✅ Poupança melhor':'⚠️ CDB rende mais'}</div></div>
  </div></div>`;}
function cRV(){return`
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">📈 Ações / FIIs</div>
  <div style="font-size:.76rem;color:var(--tx3);margin-bottom:18px">Calcule retorno considerando dividendos e IR.</div>
  <div class="cgrid">
    <div class="cfi"><label>Preço de Compra (R$)</label><input type="text" id="rv-c" placeholder="30,00" class="brl"/></div>
    <div class="cfi"><label>Preço Atual/Venda (R$)</label><input type="text" id="rv-v" placeholder="38,50" class="brl"/></div>
    <div class="cfi"><label>Quantidade</label><input type="number" id="rv-q" placeholder="100" min="1"/></div>
    <div class="cfi"><label>Dividendos recebidos (R$)</label><input type="text" id="rv-d" placeholder="0,00" class="brl"/></div>
    <div class="cfi"><label>Tipo</label><select id="rv-t"><option value="acao">Ação (IR 15%)</option><option value="fii">FII (IR 20%)</option><option value="etf">ETF (IR 15%)</option></select></div>
    <div class="cfi" style="align-self:flex-end"><button class="cbtn" onclick="calcRV()">⚡ Calcular</button></div>
  </div>
  <div id="rv-res" style="display:none"></div>
</div>
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">📊 Dividend Yield</div>
  <div class="cgrid2">
    <div class="cfi"><label>Dividendo mensal/cota (R$)</label><input type="text" id="dy-d" placeholder="0,80" class="brl"/></div>
    <div class="cfi"><label>Preço atual (R$)</label><input type="text" id="dy-p" placeholder="100,00" class="brl"/></div>
  </div>
  <button class="cbtn" onclick="calcDY()">⚡ Calcular DY</button>
  <div id="dy-res" style="display:none;margin-top:12px"></div>
</div>`;}
function calcRV(){
  const c=parseBRL(document.getElementById('rv-c')?.value||'0');
  const v=parseBRL(document.getElementById('rv-v')?.value||'0');
  const q=parseInt(document.getElementById('rv-q')?.value||0);
  const d=parseBRL(document.getElementById('rv-d')?.value||'0');
  const t=document.getElementById('rv-t')?.value;
  if(!c||!v||!q){toast('Preencha os campos','err');return;}
  const custo=c*q;const venda=v*q;const lucro=venda-custo;
  const aliq=t==='fii'?.2:.15;const ir=lucro>0?lucro*aliq:0;
  const liq=lucro-ir+d;
  document.getElementById('rv-res').style.display='block';
  document.getElementById('rv-res').innerHTML=`<div class="cres"><div class="cres-grid">
    <div><div class="cri-lbl">Custo Total</div><div class="cri-val">${fmt(custo)}</div></div>
    <div><div class="cri-lbl">Valor Venda</div><div class="cri-val" style="color:var(--blue)">${fmt(venda)}</div></div>
    <div><div class="cri-lbl">Lucro Capital</div><div class="cri-val" style="color:${lucro>=0?'var(--green)':'var(--red)'}">${fmt(lucro)}</div></div>
    ${ir>0?`<div><div class="cri-lbl">IR (${(aliq*100).toFixed(0)}%)</div><div class="cri-val" style="color:var(--red)">-${fmt(ir)}</div></div>`:''}
    ${d>0?`<div><div class="cri-lbl">Dividendos</div><div class="cri-val" style="color:var(--teal)">${fmt(d)}</div></div>`:''}
    <div><div class="cri-lbl">Resultado Líquido</div><div class="cri-val" style="color:${liq>=0?'var(--green)':'var(--red)'}">${fmt(liq)}</div><div style="font-size:.7rem;color:var(--tx3)">${(liq/custo*100).toFixed(2)}% líquido</div></div>
  </div></div>`;}
function calcDY(){
  const d=parseBRL(document.getElementById('dy-d')?.value||'0');
  const p=parseBRL(document.getElementById('dy-p')?.value||'0');
  if(!d||!p){toast('Preencha os campos','err');return;}
  const dm=d/p*100;const da=dm*12;
  document.getElementById('dy-res').style.display='block';
  document.getElementById('dy-res').innerHTML=`<div class="cres"><div class="cres-grid">
    <div><div class="cri-lbl">DY Mensal</div><div class="cri-val" style="color:var(--green)">${dm.toFixed(2)}%</div></div>
    <div><div class="cri-lbl">DY Anual</div><div class="cri-val" style="color:var(--blue)">${da.toFixed(2)}%</div></div>
    <div><div class="cri-lbl">Meses p/ pagar preço</div><div class="cri-val" style="color:var(--purple)">${(p/d).toFixed(0)} meses</div></div>
  </div></div>`;}
function cMil(){return`
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">✈️ Vale a pena comprar milhas?</div>
  <div style="font-size:.76rem;color:var(--tx3);margin-bottom:18px">Compare o custo da oferta com o valor real da passagem.</div>
  <div class="cgrid">
    <div class="cfi"><label>Preço da oferta (R$)</label><input type="text" id="ml-p" placeholder="100,00" class="brl"/></div>
    <div class="cfi"><label>Pontos na oferta</label><input type="number" id="ml-pts" placeholder="500" min="1"/></div>
    <div class="cfi"><label>Passagem desejada (R$)</label><input type="text" id="ml-pass" placeholder="2.500,00" class="brl"/></div>
    <div class="cfi"><label>Milhas p/ passagem</label><input type="number" id="ml-mpass" placeholder="25000" min="1"/></div>
    <div class="cfi"><label>Taxa de embarque (R$)</label><input type="text" id="ml-tx" placeholder="250,00" class="brl"/></div>
    <div class="cfi" style="align-self:flex-end"><button class="cbtn" onclick="calcMil()">⚡ Calcular</button></div>
  </div>
  <div id="ml-res" style="display:none"></div>
</div>
<div class="cbox">
  <div style="font-size:.95rem;font-weight:700;margin-bottom:4px">💱 Conversor de Pontos</div>
  <div class="cgrid2">
    <div class="cfi"><label>Quantidade de pontos</label><input type="number" id="cv-pts" placeholder="10000"/></div>
    <div class="cfi"><label>Valor do milheiro (R$)</label><input type="text" id="cv-mil" placeholder="35,00" class="brl"/></div>
  </div>
  <button class="cbtn" onclick="calcConv()">⚡ Converter</button>
  <div id="cv-res" style="display:none;margin-top:12px"></div>
</div>`;}
function calcMil(){
  const p=parseBRL(document.getElementById('ml-p')?.value||'0');
  const pts=parseInt(document.getElementById('ml-pts')?.value||0);
  const pass=parseBRL(document.getElementById('ml-pass')?.value||'0');
  const mpass=parseInt(document.getElementById('ml-mpass')?.value||0);
  const tx=parseBRL(document.getElementById('ml-tx')?.value||'0');
  if(!p||!pts||!pass||!mpass){toast('Preencha todos os campos','err');return;}
  const milhPago=(p/pts)*1000;
  const custoMilhas=(p/pts)*mpass;
  const custoTotal=custoMilhas+tx;
  const milhImpl=((pass-tx)/mpass)*1000;
  const econ=pass-custoTotal;
  const vale=econ>0;
  document.getElementById('ml-res').style.display='block';
  document.getElementById('ml-res').innerHTML=`<div class="cres">
    <div style="margin-bottom:14px"><span class="${vale?'badge bg':'badge br'}" style="font-size:.8rem">${vale?`✅ Vale a pena! Economia de ${fmt(econ)}`:`❌ Não vale! Gastaria ${fmt(Math.abs(econ))} a mais`}</span></div>
    <div class="cres-grid">
      <div><div class="cri-lbl">Milheiro pago</div><div class="cri-val">${fmt(milhPago)}</div></div>
      <div><div class="cri-lbl">Milheiro implícito</div><div class="cri-val" style="color:var(--blue)">${fmt(milhImpl)}</div></div>
      <div><div class="cri-lbl">Custo das milhas</div><div class="cri-val" style="color:var(--purple)">${fmt(custoMilhas)}</div></div>
      <div><div class="cri-lbl">Custo total (c/ taxa)</div><div class="cri-val" style="color:var(--yellow)">${fmt(custoTotal)}</div></div>
    </div>
    <div style="font-size:.73rem;color:var(--tx3);margin-top:12px">💡 Se milheiro pago (${fmt(milhPago)}) < milheiro implícito (${fmt(milhImpl)}) → vale a pena.</div>
  </div>`;}
function calcConv(){
  const pts=parseInt(document.getElementById('cv-pts')?.value||0);
  const mil=parseBRL(document.getElementById('cv-mil')?.value||'0');
  if(!pts||!mil){toast('Preencha os campos','err');return;}
  const val=(pts/1000)*mil;
  document.getElementById('cv-res').style.display='block';
  document.getElementById('cv-res').innerHTML=`<div class="cres"><div class="cres-grid">
    <div><div class="cri-lbl">Seus pontos valem</div><div class="cri-val" style="color:var(--green)">${fmt(val)}</div></div>
    <div><div class="cri-lbl">Por ponto</div><div class="cri-val" style="color:var(--blue)">R$ ${(mil/1000).toFixed(4)}</div></div>
  </div></div>`;}

// ══════════════ MODAL ════════════════════════════
function openMd(title,body,onSave,readOnly=false){
  const ov=document.createElement('div');ov.className='mo';ov.id='modal-ov';
  ov.onclick=e=>{if(e.target===ov)closeM();};
  ov.innerHTML=`<div class="md">
    <div class="mh"><div class="mt">${title}</div><button class="btn-ic" onclick="closeM()">✕</button></div>
    <div class="mb">${body}</div>
    ${!readOnly?`<div class="mf"><button class="btn btn-g" onclick="closeM()">Cancelar</button><button class="btn btn-p" onclick="handleSave()">Salvar</button></div>`:''}
  </div>`;
  ov._onSave=onSave;
  document.body.appendChild(ov);
  setTimeout(()=>{applyMasks();document.querySelector('#modal-ov input[type=text],#modal-ov input[type=number]')?.focus();},60);
}
function handleSave(){
  const ov=document.getElementById('modal-ov');
  if(ov&&ov._onSave){const ok=ov._onSave();if(ok!==false){closeM();rpage();}}
}
function closeM(){document.getElementById('modal-ov')?.remove();}

// ══════════════ IMPORT/EXPORT ════════════════════
function expData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`financeiro_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Exportado!');
}
function impClick(){document.getElementById('imp-file').click();}
function impData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.data){
        S.data={...S.data,...d.data};
        if(d.cards)S.cards=d.cards;
        if(d.orcMacro)S.orcMacro=d.orcMacro;
        if(d.orcMicro)S.orcMicro=d.orcMicro;
        if(d.metas)S.metas=d.metas;
        if(d.macros)S.macros=d.macros;
        save();toast('Importado!');render();
      }else toast('Arquivo inválido','err');
    }catch{toast('Erro ao importar','err');}
  };r.readAsText(f);
}

// ══════════════ KEYBOARD ═════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeM();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openTrans();}
});

load();render();initFb();
// Handle redirect result (when returning from Google login page)
waitFb(()=>{
  const{auth,getRedirectResult}=window._fb;
  getRedirectResult(auth).then(result=>{
    if(result&&result.user){
      console.log('Login via redirect ok:',result.user.email);
      // onAuthStateChanged will fire automatically
    }
  }).catch(e=>{
    if(e.code&&e.code!=='auth/no-current-user'&&e.code!=='auth/null-user'){
      console.error('Redirect result err:',e.code,e.message);
      toast('Erro no login: '+e.code,'err');
    }
  });
});
